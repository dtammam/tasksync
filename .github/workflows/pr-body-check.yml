name: PR Body Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-body:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body sections
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request?.body ?? '').replace(/\r\n/g, '\n');
            const stripComments = (value) => value.replace(/<!--[\s\S]*?-->/g, '').trim();
            const headings = [...body.matchAll(/^##\s+(.+?)\s*$/gm)];
            const sections = new Map();

            for (let index = 0; index < headings.length; index += 1) {
              const current = headings[index];
              const next = headings[index + 1];
              const title = current[1].trim().toLowerCase();
              const start = current.index + current[0].length;
              const end = next ? next.index : body.length;
              sections.set(title, body.slice(start, end).trim());
            }

            const requiredSections = [
              { title: 'Summary', minChars: 12 },
              { title: 'Test Plan', minChars: 8 },
              { title: 'Risks', minChars: 4 },
              { title: 'Docs Impact', minChars: 1 },
              { title: 'Rollout Notes', minChars: 4 }
            ];

            const failures = [];

            for (const requirement of requiredSections) {
              const key = requirement.title.toLowerCase();
              if (!sections.has(key)) {
                failures.push(`Missing section: "${requirement.title}"`);
                continue;
              }
              const cleaned = stripComments(sections.get(key));
              if (cleaned.length < requirement.minChars) {
                failures.push(`Section "${requirement.title}" is empty or too short.`);
              }
            }

            const docsImpact = sections.get('docs impact') ?? '';
            if (!/-\s*\[[xX]\]\s+/.test(docsImpact)) {
              failures.push('Docs Impact must have at least one checked checkbox (`- [x] ...`).');
            }

            if (failures.length) {
              core.setFailed(`PR body validation failed:\n- ${failures.join('\n- ')}`);
              return;
            }

            core.notice('PR body sections look good.');

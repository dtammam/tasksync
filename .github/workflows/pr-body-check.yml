name: PR Body Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-body:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate required summary
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request?.body ?? '').replace(/\r\n/g, '\n');
            const stripComments = (value) => value.replace(/<!--[\s\S]*?-->/g, '').trim();
            const headings = [...body.matchAll(/^##\s+(.+?)\s*$/gm)];
            const sections = new Map();

            for (let index = 0; index < headings.length; index += 1) {
              const current = headings[index];
              const next = headings[index + 1];
              const title = current[1].trim().toLowerCase();
              const start = current.index + current[0].length;
              const end = next ? next.index : body.length;
              sections.set(title, body.slice(start, end).trim());
            }

            if (!sections.has('summary')) {
              core.setFailed('PR body must include a "## Summary" section with one sentence.');
              return;
            }

            const note = stripComments(sections.get('summary'));
            if (!note || note.length < 12 || /^(none|n\/a|na)$/i.test(note)) {
              core.setFailed(
                'PR body "Summary" must include at least one meaningful sentence (12+ characters).'
              );
              return;
            }

            core.notice('PR body includes a valid summary.');

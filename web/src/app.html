<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			window.__TASKSYNC_RUNTIME_CONFIG__ = window.__TASKSYNC_RUNTIME_CONFIG__ || {};
		</script>
		<script src="/runtime-config.js"></script>
		<script>
			// Inline FOUC-prevention script: sets data-ui-theme and data-ui-font on <html>
			// before first paint so the correct theme/font CSS variables apply immediately.
			// Must run synchronously during HTML parsing — do NOT add type="module" or defer.
			try {
				if (typeof localStorage !== 'undefined') {
					// SYNC: These whitelists must match validThemes and validFonts in
					// web/src/lib/stores/preferences.ts. A unit test (fouc-whitelist.test.ts)
					// enforces this.
					var validThemes = ['default','dark','light','shades-of-coffee','miami-beach','simple-dark','matrix','black-gold','okabe-ito','theme-from-1970','shades-of-gray-light','catppuccin-latte','catppuccin-frappe','catppuccin-macchiato','catppuccin-mocha','you-need-a-dark-mode','butterfly'];
					var validFonts = ['sora','sono','inter','inter-tight','jetbrains-mono','atkinson-hyperlegible','atkinson-hyperlegible-next','ibm-plex-sans','ibm-plex-mono','ibm-plex-serif','roboto','roboto-slab','roboto-mono','dm-mono','comfortaa','poppins','victor-mono','pt-sans','pt-serif','pt-mono','georgia','sf-pro','system'];
					var fontSlug = 'sora';
					var PREFIX = 'tasksync:ui-preferences:';
					var scopedValue = null;
					var anonValue = null;
					for (var i = 0; i < localStorage.length; i++) {
						var key = localStorage.key(i);
						if (key && key.indexOf(PREFIX) === 0) {
							var suffix = key.slice(PREFIX.length);
							if (suffix === 'anon') {
								anonValue = localStorage.getItem(key);
							} else {
								// Scoped key (space_id:user_id) — prefer over anon
								scopedValue = localStorage.getItem(key);
							}
						}
					}
					var raw = scopedValue !== null ? scopedValue : anonValue;
					if (raw !== null) {
						var prefs = JSON.parse(raw);
						if (prefs && typeof prefs.theme === 'string' && validThemes.indexOf(prefs.theme) !== -1) {
							document.documentElement.setAttribute('data-ui-theme', prefs.theme);
						}
						if (prefs && typeof prefs.font === 'string' && validFonts.indexOf(prefs.font) !== -1) {
							document.documentElement.setAttribute('data-ui-font', prefs.font);
							fontSlug = prefs.font;
						}
					}
					var fontUrls = {
						'sora': 'https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap',
						'sono': 'https://fonts.googleapis.com/css2?family=Sono:wght@400;500;600;700;800&display=swap',
						'inter': 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap',
						'inter-tight': 'https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap',
						'jetbrains-mono': 'https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap',
						'atkinson-hyperlegible': 'https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap',
						'atkinson-hyperlegible-next': 'https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;700&display=swap',
						'ibm-plex-sans': 'https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap',
						'ibm-plex-mono': 'https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap',
						'ibm-plex-serif': 'https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;600;700&display=swap',
						'roboto': 'https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap',
						'roboto-slab': 'https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&display=swap',
						'roboto-mono': 'https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&display=swap',
						'dm-mono': 'https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap',
						'comfortaa': 'https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap',
						'poppins': 'https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap',
						'victor-mono': 'https://fonts.googleapis.com/css2?family=Victor+Mono:wght@400;500;600;700&display=swap',
						'pt-sans': 'https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap',
						'pt-serif': 'https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&display=swap',
						'pt-mono': 'https://fonts.googleapis.com/css2?family=PT+Mono&display=swap'
					};
					var url = fontUrls[fontSlug];
					if (url) {
						var pc1 = document.createElement('link');
						pc1.rel = 'preconnect';
						pc1.href = 'https://fonts.googleapis.com';
						document.head.appendChild(pc1);
						var pc2 = document.createElement('link');
						pc2.rel = 'preconnect';
						pc2.href = 'https://fonts.gstatic.com';
						pc2.crossOrigin = 'anonymous';
						document.head.appendChild(pc2);
						var pl = document.createElement('link');
						pl.rel = 'preload';
						pl.as = 'style';
						pl.href = url;
						document.head.appendChild(pl);
						var sl = document.createElement('link');
						sl.rel = 'stylesheet';
						sl.href = url;
						document.head.appendChild(sl);
					}
				}
			} catch (e) {
				// Intentionally silent: logging infrastructure is not yet available at
				// HTML-shell parse time. Any error here must not block the page load.
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
